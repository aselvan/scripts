<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 180px; font-family: sans-serif; padding: 12px; background-color: #fafafa; color: #333; }
    .header { font-size: 13px; font-weight: bold; margin-bottom: 8px; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
    .author { font-size: 11px; color: #555; margin-bottom: 2px; }
    .link { font-size: 10px; color: #0066cc; text-decoration: none; display: block; margin-bottom: 10px; }
    .setting-item { display: flex; align-items: center; justify-content: space-between; font-size: 11px; border-top: 1px solid #eee; padding-top: 8px; }
    .version { font-size: 9px; color: #999; margin-top: 12px; text-align: center; }
  </style>
</head>
<body>
  <div class="header">LinkedIn Extension Blocker</div>
  <div class="author">Arul Selvan</div>
  <a href="https://www.selvansoft.com" target="_blank" class="link">selvansoft.com</a>
  
  <div class="setting-item">
    <span>Debug Mode</span>
    <input type="checkbox" id="debugToggle">
  </div>
  <div class="version">v1.2.1</div>
  <script src="src/popup.js"></script>
</body>
</html>
